<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gophish API Documentation — Yazamco SOC</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui.css"
          integrity="sha384-wxLW6kwyHktdDGr6Pv1zgm/VGJh99lfUbzSn6HNHBENZlCN7W602k9VkGdxuFvPn" crossorigin="anonymous">
    <style>
        /* ---- SOC dark theme for Swagger UI ---- */
        :root {
            --soc-bg: #0b1118;
            --soc-panel: #101924;
            --soc-panel-2: #15202e;
            --soc-border: #1f2d3d;
            --soc-text: #d7e2ee;
            --soc-muted: #8aa0b8;
            --soc-accent: #35d0ba;
        }
        html, body { margin: 0; background: var(--soc-bg); }
        .topbar { display: none; }
        .soc-header {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 24px; background: var(--soc-panel);
            border-bottom: 1px solid var(--soc-border);
            font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        .soc-header img { height: 30px; }
        .soc-header .title { color: var(--soc-text); font-size: 16px; font-weight: 600; letter-spacing: .04em; }
        .soc-header .badge {
            margin-left: auto; color: var(--soc-accent); border: 1px solid var(--soc-accent);
            border-radius: 999px; padding: 3px 12px; font-size: 11px; letter-spacing: .12em;
            text-transform: uppercase;
        }
        .swagger-ui, .swagger-ui .info .title, .swagger-ui .info li, .swagger-ui .info p,
        .swagger-ui .info td, .swagger-ui .info th, .swagger-ui .info h1, .swagger-ui .info h2,
        .swagger-ui .info h3, .swagger-ui .info h4, .swagger-ui .opblock-tag,
        .swagger-ui .opblock .opblock-summary-description, .swagger-ui .opblock-description-wrapper p,
        .swagger-ui .opblock-external-docs-wrapper, .swagger-ui .opblock-title_normal,
        .swagger-ui table thead tr td, .swagger-ui table thead tr th,
        .swagger-ui .parameter__name, .swagger-ui .parameter__type, .swagger-ui .parameter__in,
        .swagger-ui .response-col_status, .swagger-ui .response-col_links,
        .swagger-ui .responses-inner h4, .swagger-ui .responses-inner h5,
        .swagger-ui .model, .swagger-ui .model-title, .swagger-ui section.models h4,
        .swagger-ui .scheme-container .schemes-title, .swagger-ui label,
        .swagger-ui .dialog-ux .modal-ux-content p, .swagger-ui .dialog-ux .modal-ux-content h4,
        .swagger-ui .dialog-ux .modal-ux-header h3, .swagger-ui .auth-container .wrapper,
        .swagger-ui .markdown p, .swagger-ui .markdown li, .swagger-ui .markdown h2, .swagger-ui .renderedMarkdown p,
        .swagger-ui .tab li, .swagger-ui .opblock-section-header h4, .swagger-ui .opblock-section-header label {
            color: var(--soc-text);
        }
        .swagger-ui .info .description, .swagger-ui .parameter__extension,
        .swagger-ui .prop-format, .swagger-ui .response-col_description__inner p { color: var(--soc-muted); }
        .swagger-ui .scheme-container { background: var(--soc-panel); box-shadow: none; border-bottom: 1px solid var(--soc-border); }
        .swagger-ui .opblock-tag { border-bottom: 1px solid var(--soc-border); }
        .swagger-ui .opblock { background: var(--soc-panel); border-color: var(--soc-border); box-shadow: none; }
        .swagger-ui .opblock .opblock-section-header { background: var(--soc-panel-2); box-shadow: none; }
        .swagger-ui .opblock .opblock-summary { border-color: var(--soc-border); }
        .swagger-ui section.models, .swagger-ui section.models .model-container { background: var(--soc-panel); border-color: var(--soc-border); }
        .swagger-ui .model-box { background: var(--soc-panel-2); }
        .swagger-ui .prop-type { color: var(--soc-accent); }
        .swagger-ui input[type=text], .swagger-ui input[type=password], .swagger-ui input[type=email],
        .swagger-ui input[type=file], .swagger-ui textarea, .swagger-ui select {
            background: var(--soc-panel-2); color: var(--soc-text); border: 1px solid var(--soc-border);
        }
        .swagger-ui .dialog-ux .modal-ux { background: var(--soc-panel); border: 1px solid var(--soc-border); }
        .swagger-ui .dialog-ux .modal-ux-header { border-bottom: 1px solid var(--soc-border); }
        .swagger-ui .btn { color: var(--soc-text); border-color: var(--soc-border); }
        .swagger-ui .btn.authorize { color: var(--soc-accent); border-color: var(--soc-accent); }
        .swagger-ui .btn.authorize svg { fill: var(--soc-accent); }
        .swagger-ui .copy-to-clipboard { background: var(--soc-panel-2); }
        .swagger-ui .responses-table .response-col_description .markdown p { color: var(--soc-muted); }
        .swagger-ui .filter .operation-filter-input { background: var(--soc-panel-2); border-color: var(--soc-border); }
        .swagger-ui .opblock .opblock-summary-path, .swagger-ui .opblock .opblock-summary-path__deprecated { color: var(--soc-text); }
        .swagger-ui .opblock.opblock-get .opblock-summary-method { background: #2f81f7; }
        .swagger-ui .opblock.opblock-post .opblock-summary-method { background: #2ea043; }
        .swagger-ui .opblock.opblock-put .opblock-summary-method { background: #d29922; }
        .swagger-ui .opblock.opblock-delete .opblock-summary-method { background: #f85149; }
        .swagger-ui .expand-methods svg, .swagger-ui .expand-operation svg,
        .swagger-ui .model-toggle:after, .swagger-ui .arrow { filter: invert(80%); }
        .swagger-ui .servers > label select { background: var(--soc-panel-2); color: var(--soc-text); }
    </style>
</head>
<body>
    <div class="soc-header">
        <img src="/images/yazamco-logo-on-dark.png" alt="Yazamco pro Cyber">
        <span class="title">Gophish API Documentation</span>
        <span class="badge">Live · This Instance</span>
    </div>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-bundle.js"
            integrity="sha384-wmyclcVGX/WhUkdkATwhaK1X1JtiNrr2EoYJ+diV3vj4v6OC5yCeSu+yW13SYJep" crossorigin="anonymous"></script>
    <script>
        window.onload = function () {
            window.ui = SwaggerUIBundle({
                url: "/docs/swagger.json",
                dom_id: "#swagger-ui",
                deepLinking: true,
                filter: true,
                docExpansion: "list",
                defaultModelsExpandDepth: 1,
                defaultModelExpandDepth: 2,
                displayRequestDuration: true,
                tryItOutEnabled: true,
                persistAuthorization: true,
                presets: [SwaggerUIBundle.presets.apis],
                validatorUrl: null
            });
        };
    </script>
</body>
</html>
