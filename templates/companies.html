{{define "body"}}
<div class="col-sm-9 col-sm-offset-3 col-md-10 col-md-offset-2 main">
  <div class="canvas-inner fade-up">
    <div id="flashes"></div>
    <div class="soc-between" style="margin-bottom:18px;">
        <div class="soc-section-title">Companies</div>
        <button type="button" class="btn btn-primary" id="new_button" data-toggle="modal" data-backdrop="static"
            data-company-id="-1" data-target="#modal">
            <i class="fa fa-plus"></i>&nbsp;New Company</button>
    </div>
    <div id="loading">
        <i class="fa fa-spinner fa-spin fa-4x"></i>
    </div>
    <div id="emptyMessage" style="display:none;">
        <div class="alert alert-info">
            No companies created yet. Create one to start grouping campaigns by company.
        </div>
    </div>
    <div class="panel table-panel">
        <table id="companyTable" class="table" style="display:none;">
            <thead>
                <tr>
                    <th>Company</th>
                    <th>Hebrew Name</th>
                    <th>Customer ID</th>
                    <th>Campaigns</th>
                    <th>Last Modified</th>
                    <th class="no-sort"></th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade cx sm" id="modal" tabindex="-1" role="dialog" aria-labelledby="companyModalLabel">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="cx-head">
                <div class="hi"><i class="fa fa-building"></i></div>
                <div style="min-width:0;">
                    <h4 class="modal-title" id="companyModalLabel">New Company</h4>
                    <p class="cx-sub">group campaigns under a client organization</p>
                </div>
                <button type="button" class="icon-btn cx-x" data-dismiss="modal" aria-label="Close"><i class="fa fa-times"></i></button>
            </div>
            <div class="cx-body">
                <div class="cx-main" id="modal_body">
                    <div id="modal.flashes" style="margin-bottom:14px;"></div>
                    <div class="field" id="hudu_picker" style="position:relative;">
                        <label for="hudu_search">Add from Hudu</label>
                        <input type="text" class="form-control" placeholder="Search Hudu companies…" id="hudu_search" autocomplete="off" autofocus />
                        <div id="hudu_results" class="hudu-results" style="display:none;"></div>
                        <p class="cx-sub" id="hudu_status" style="margin:6px 0 0;"></p>
                    </div>
                    <div class="field">
                        <label for="name">Company name</label>
                        <input type="text" class="form-control" placeholder="e.g. Acme Corporation" id="name" required />
                    </div>
                    <div class="field">
                        <label for="name_he">Hebrew name <span style="font-weight:400;opacity:.7;">(shown on reports)</span></label>
                        <input type="text" class="form-control" placeholder="לדוגמה: אקמי בע&quot;מ" id="name_he" dir="rtl" />
                    </div>
                    <div class="field">
                        <label for="customer_id">Customer ID</label>
                        <input type="text" class="form-control" placeholder="e.g. 8099803" id="customer_id" />
                    </div>
                </div>
            </div>
            <div class="cx-foot">
                <button type="button" class="btn btn-ghost" data-dismiss="modal">Cancel</button>
                <div class="grow"></div>
                <button type="button" class="btn btn-primary" id="modalSubmit"><i class="fa fa-check"></i>&nbsp;Save changes</button>
            </div>
        </div>
    </div>
</div>
{{end}} {{define "scripts"}}
<script src="/js/dist/app/companies.min.js"></script>
{{end}}
