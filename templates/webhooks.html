{{define "body"}}
<div class="col-sm-9 col-sm-offset-3 col-md-10 col-md-offset-2 main">
  <div class="canvas-inner fade-up">
    <div id="flashes"></div>
    <div class="soc-between" style="margin-bottom:18px;">
        <div class="soc-section-title">Webhooks</div>
        <button type="button" class="btn btn-primary" id="new_button" data-toggle="modal" data-backdrop="static"
            data-webhook-id="-1" data-target="#modal">
            <i class="fa fa-plus"></i>&nbsp;New Webhook</button>
    </div>
    <div id="loading">
        <i class="fa fa-spinner fa-spin fa-4x"></i>
    </div>
    <div class="panel table-panel">
        <table id="webhookTable" class="table" style="display:none;">
            <thead>
                <tr>
                    <th class="col-md-2 no-sort">Title</th>
                    <th class="col-md-2 no-sort">Url</th>
                    <th class="col-md-2 no-">Is active</th>
                    <th class="col-md-2 no-sort"></th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade cx sm" id="modal" tabindex="-1" role="dialog" aria-labelledby="webhookModalLabel">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="cx-head">
                <div class="hi"><i class="fa fa-plug"></i></div>
                <div style="min-width:0;">
                    <h4 class="modal-title" id="webhookModalLabel">Add or Edit Webhook</h4>
                    <p class="cx-sub">stream campaign events to an external endpoint</p>
                </div>
                <button type="button" class="icon-btn cx-x" data-dismiss="modal" aria-label="Close"><i class="fa fa-times"></i></button>
            </div>
            <div class="cx-body">
                <div class="cx-main" id="modal_body">
                    <div id="modal.flashes" style="margin-bottom:14px;"></div>
                    <div class="stack" style="gap:15px;">
                        <div class="field">
                            <label for="name">Name</label>
                            <input type="text" class="form-control" placeholder="e.g. SIEM — Splunk HEC" id="name" required autofocus />
                        </div>
                        <div class="field">
                            <label for="url">Endpoint URL</label>
                            <input type="text" class="form-control mono" placeholder="https://example.com/webhook1" id="url" required />
                        </div>
                        <div class="field">
                            <label for="secret">Signing secret</label>
                            <input type="text" class="form-control mono" placeholder="Secret" id="secret" required />
                        </div>
                        <label class="checkrow" style="margin:0;">
                            <input type="checkbox" id="is_active" value="true" />
                            <span class="bx"><i class="fa fa-check"></i></span>
                            <div style="flex:1;min-width:0;">
                                <b style="font-size:13px;display:block;font-weight:600;">Active</b>
                                <span class="mono" style="font-size:10.5px;color:var(--ink-dim);">data is sent only to active webhooks</span>
                            </div>
                        </label>
                    </div>
                </div>
            </div>
            <div class="cx-foot">
                <button type="button" class="btn btn-ghost" data-dismiss="modal">Cancel</button>
                <div class="grow"></div>
                <button type="button" class="btn btn-primary" id="modalSubmit"><i class="fa fa-check"></i>&nbsp;Save changes</button>
            </div>
        </div>
    </div>
</div>


{{end}} {{define "scripts"}}
<script src="/js/dist/app/webhooks.min.js"></script>
{{end}}
