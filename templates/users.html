{{define "body"}}
<div class="col-sm-9 col-sm-offset-3 col-md-10 col-md-offset-2 main">
  <div class="canvas-inner fade-up">
    <div id="flashes">
        {{template "flashes" .Flashes}}
    </div>
    <div class="soc-between" style="margin-bottom:18px;">
        <div class="soc-section-title">User Management</div>
        <button type="button" class="btn btn-primary" id="new_button" data-toggle="modal" data-backdrop="static"
            data-user-id="-1" data-target="#modal">
            <i class="fa fa-plus"></i>&nbsp;New User</button>
    </div>
    <div id="loading">
        <i class="fa fa-spinner fa-spin fa-4x"></i>
    </div>
    <div class="panel table-panel">
        <table id="userTable" class="table" style="display:none;">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Last Login</th>
                    <th class="col-md-2 no-sort"></th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
  </div>
</div>
<!-- Modal -->
<div class="modal fade cx sm" id="modal" tabindex="-1" role="dialog" aria-labelledby="userModalLabel">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="cx-head">
                <div class="hi"><i class="fa fa-user"></i></div>
                <div style="min-width:0;">
                    <h4 class="modal-title" id="userModalLabel">New User</h4>
                    <p class="cx-sub">grant access to the administration console</p>
                </div>
                <button type="button" class="icon-btn cx-x" data-dismiss="modal" aria-label="Close"><i class="fa fa-times"></i></button>
            </div>
            <div class="cx-body">
                <div class="cx-main" id="modal_body">
                    <div id="modal.flashes" style="margin-bottom:14px;"></div>
                    <div class="stack" style="gap:15px;">
                        <div class="field">
                            <label for="username">Username</label>
                            <input type="text" class="form-control" placeholder="Username" id="username" autofocus />
                        </div>
                        <div class="field">
                            <label for="password">Password</label>
                            <input type="password" class="form-control" autocomplete="new-password" placeholder="Password" id="password" required />
                            <div class="hidden" id="password-strength-container">
                                <div class="progress" id="password-strength">
                                    <div id="password-strength-bar" class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                                <span id="password-strength-description"></span>
                            </div>
                        </div>
                        <div class="field">
                            <label for="confirm_password">Confirm password</label>
                            <input type="password" class="form-control" placeholder="Confirm Password" id="confirm_password" required />
                        </div>
                        <label class="checkrow" style="margin:0;">
                            <input id="force_password_change_checkbox" type="checkbox" checked>
                            <span class="bx"><i class="fa fa-check"></i></span>
                            <div style="flex:1;min-width:0;"><b style="font-size:13px;display:block;font-weight:600;">Require the user to set a new password</b></div>
                        </label>
                        <label class="checkrow" style="margin:0;">
                            <input id="account_locked_checkbox" type="checkbox">
                            <span class="bx"><i class="fa fa-check"></i></span>
                            <div style="flex:1;min-width:0;"><b style="font-size:13px;display:block;font-weight:600;">Account locked</b></div>
                        </label>
                        <div class="field" id="role-select">
                            <label for="role">Role</label>
                            <select class="form-control" id="role">
                                <option value="admin">Admin</option>
                                <option value="user">User</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="cx-foot">
                <button type="button" class="btn btn-ghost" data-dismiss="modal">Cancel</button>
                <div class="grow"></div>
                <button type="button" class="btn btn-primary" id="modalSubmit"><i class="fa fa-check"></i>&nbsp;Save changes</button>
            </div>
        </div>
    </div>
</div>
{{end}} {{define "scripts"}}
<script src="/js/dist/app/passwords.min.js"></script>
<script src="/js/dist/app/users.min.js"></script>
{{end}}
