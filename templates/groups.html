{{define "body"}}
<div class="col-sm-9 col-sm-offset-3 col-md-10 col-md-offset-2 main">
  <div class="canvas-inner stack fade-up">
    <div id="flashes"></div>
    <div class="soc-grid-3" id="groupKpis"></div>
    <div class="soc-split">
        <div class="panel">
            <div class="panel-head">
                <div><h3>Groups</h3><div class="sub">target population</div></div>
                <div class="head-actions">
                    <button type="button" class="btn btn-sm btn-primary" onclick="edit(-1)" data-toggle="modal"
                        data-backdrop="static" data-target="#modal"><i class="fa fa-plus"></i>&nbsp;New Group</button>
                </div>
            </div>
            <div id="loading"><i class="fa fa-spinner fa-spin fa-4x"></i></div>
            <div id="emptyMessage" style="display:none;">
                <div class="alert alert-info" style="margin:14px;">No groups created yet. Let's create one!</div>
            </div>
            <div class="table-panel">
                <table id="groupTable" class="table" style="display:none;">
                    <thead>
                        <tr>
                            <th>Group</th>
                            <th>Members</th>
                            <th>Updated</th>
                            <th class="no-sort"></th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="panel">
            <div class="panel-head">
                <div><h3 id="memberGroupName">Members</h3><div class="sub" id="memberCount"></div></div>
                <div class="head-actions">
                    <button type="button" class="btn btn-sm" id="memberEditBtn" style="display:none;"><i class="fa fa-pencil"></i>&nbsp;Edit</button>
                </div>
            </div>
            <div class="table-panel">
                <table class="table">
                    <thead><tr><th>Member</th><th>Position</th></tr></thead>
                    <tbody id="memberTbody"></tbody>
                </table>
            </div>
            <div id="memberEmpty" class="panel-body" style="color:var(--ink-faint);font-family:var(--mono-font);font-size:12px;">Select a group to view its members.</div>
        </div>
    </div>
  </div>
</div>
<!-- Modal -->
<div class="modal fade" id="modal" tabindex="-1" role="dialog" aria-labelledby="modalLabel">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
                <h4 class="modal-title" id="groupModalLabel">New Group</h4>
            </div>
            <div class="modal-body">
                <div class="row" id="modal.flashes"></div>
                <label class="control-label" for="name">Name:</label>
                <div class="form-group">
                    <input type="text" class="form-control" ng-model="group.name" placeholder="Group name" id="name"
                        autofocus />
                </div>
                <div class="form-group">
                    <span class="btn btn-danger btn-file" data-toggle="tooltip" data-placement="right"
                        title="Supports CSV files" id="fileUpload">
                        <i class="fa fa-plus"></i> Bulk Import Users
                        <input type="file" id="csvupload" multiple>
                    </span>
                    <span id="csv-template" class="text-muted small">
                        <i class="fa fa-file-excel-o"></i> Download CSV Template</span>
                </div>
                <div class="row">
                    <form id="targetForm">
                        <div class="col-sm-2">
                            <input type="text" class="form-control" placeholder="First Name" id="firstName">
                        </div>
                        <div class="col-sm-2">
                            <input type="text" class="form-control" placeholder="Last Name" id="lastName">
                        </div>
                        <div class="col-sm-3">
                            <input type="email" class="form-control" placeholder="Email" id="email" required>
                        </div>
                        <div class="col-sm-3">
                            <input type="text" class="form-control" placeholder="Position" id="position">
                        </div>
                        <div class="col-sm-1">
                            <button type="submit" class="btn btn-danger btn-lg">
                                <i class="fa fa-plus"></i> Add</button>
                        </div>
                    </form>
                </div>
                <br />
                <table id="targetsTable" class="table table-hover table-striped table-condensed">
                    <thead>
                        <tr>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Email</th>
                            <th>Position</th>
                            <th class="no-sort"></th>
                    <tbody>
                    </tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="modalSubmit">Save changes</button>
            </div>
        </div>
    </div>
</div>
{{end}} {{define "scripts"}}
<script src="/js/dist/app/groups.min.js"></script>
{{end}}
