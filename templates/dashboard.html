{{define "body"}}
<div class="col-sm-9 col-sm-offset-3 col-md-10 col-md-offset-2 main">
  <div class="canvas-inner fade-up">
    <div id="loading">
        <i class="fa fa-spinner fa-spin fa-4x"></i>
    </div>
    {{template "flashes" .Flashes}}
    <div id="emptyMessage" style="display:none;">
        <div class="alert alert-info">
            No campaigns created yet. Let's create one!
        </div>
    </div>
    <div id="dashboard" style="display:none;" class="soc-stack">
        <div class="panel">
            <div class="panel-head">
                <h3>Phishing Success Overview</h3>
                <span class="sub">% of success across campaigns</span>
            </div>
            <div class="panel-body">
                <div id="overview_chart" style="height:240px;"></div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-head"><h3>Conversion Breakdown</h3></div>
            <div class="panel-body">
                <div class="soc-row" style="justify-content:space-around;flex-wrap:wrap;gap:10px;">
                    <div id="sent_chart" style="height:200px;flex:1 1 150px;"></div>
                    <div id="opened_chart" style="height:200px;flex:1 1 150px;"></div>
                    <div id="clicked_chart" style="height:200px;flex:1 1 150px;"></div>
                    <div id="submitted_data_chart" style="height:200px;flex:1 1 150px;"></div>
                    <div id="email_reported_chart" style="height:200px;flex:1 1 150px;"></div>
                </div>
            </div>
        </div>
        <div class="panel table-panel">
            <div class="panel-head">
                <h3>Recent Campaigns</h3>
                <div class="head-actions">
                    <a href="/campaigns" class="btn btn-sm btn-default">View All</a>
                </div>
            </div>
            <table id="campaignTable" class="table">
                <thead>
                    <tr>
                        <th class="col-md-2 col-sm-2">Name</th>
                        <th class="col-md-2 col-sm-2">Created Date</th>
                        <th class="col-md-1 col-sm-1">
                            <i class="fa fa-envelope-o"></i>
                        </th>
                        <th class="col-md-1 col-sm-1">
                            <i class="fa fa-envelope-open-o"></i>
                        </th>
                        <th class="col-md-1 col-sm-1">
                            <i class="fa fa-mouse-pointer"></i>
                        </th>
                        <th class="col-md-1 col-sm-1">
                            <i class="fa fa-exclamation-circle"></i>
                        </th>
                        <th class="col-md-1 col-sm-1">
                            <i class="fa fa-bullhorn"></i>
                        </th>
                        <th class="col-md-1 col-sm-1">Status</th>
                        <th class="col-md-2 col-sm-2 no-sort"></th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>
  </div>
</div>
{{end}} {{define "scripts"}}
<script src="/js/dist/app/dashboard.min.js"></script>
{{end}}
